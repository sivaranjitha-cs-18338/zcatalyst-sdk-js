name: Docs Audit

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  pull_request:
    branches: [main, release]
    paths:
      - 'packages/*/src/**'
      - 'tools/validate-docs/**'
      - 'typedoc.json'
  workflow_dispatch:

concurrency:
  group: docs-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      CATALYST_DOCS_BASE: ${{ secrets.CATALYST_DOCS_BASE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (needed for typedoc resolution)
        run: pnpm run build

      - name: Check docs base configured
        if: env.CATALYST_DOCS_BASE == ''
        run: |
          echo "::warning ::CATALYST_DOCS_BASE secret not set; docs scrape will be skipped."
          echo "SKIP_AUDIT=true" >> $GITHUB_ENV

      - name: Run docs audit
        if: env.SKIP_AUDIT != 'true'
        id: audit
        continue-on-error: true
        run: pnpm --filter @zcatalyst/validate-docs run audit

      - name: Upload audit report
        if: env.SKIP_AUDIT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docs-audit-${{ github.run_id }}
          path: |
            tools/validate-docs/out/audit.md
            tools/validate-docs/out/audit-summary.json

      - name: Open / update issue on weekly errors
        if: env.SKIP_AUDIT != 'true' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(
              fs.readFileSync('tools/validate-docs/out/audit-summary.json', 'utf8')
            );
            if (summary.errors === 0) {
              core.info('No errors; not opening an issue.');
              return;
            }
            const title = `Docs audit: ${summary.errors} errors, ${summary.warnings} warnings`;
            const body =
              'The weekly Catalyst docs audit found mismatches between the docs and the SDK.\n\n' +
              `- generated_at: ${summary.generated_at}\n` +
              `- git_sha: ${summary.git_sha}\n` +
              `- run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              'Download the `audit.md` artifact for the full report.';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'docs-audit',
            });
            const match = existing.data.find((i) => i.title.startsWith('Docs audit:'));
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['docs-audit'],
              });
            }

      - name: Fail job if audit failed
        if: env.SKIP_AUDIT != 'true' && steps.audit.outcome == 'failure'
        run: |
          echo "::error ::Docs audit reported errors. See uploaded audit.md."
          exit 1
